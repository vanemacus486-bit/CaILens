<!doctype html>
<html lang="en">
  <head>
    <script>
      (function() {
        var theme = localStorage.getItem('cailens-theme');
        if (!theme) {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          localStorage.setItem('cailens-theme', theme);
        }
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        }
        var accent = localStorage.getItem('cailens-accent');
        if (accent) {
          document.documentElement.setAttribute('data-accent', accent);
        }
        var font = localStorage.getItem('cailens-font');
        if (font) {
          document.documentElement.setAttribute('data-font', font);
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CaILens</title>
    <style>
      /* ── Critical splash tokens (mirrors src/index.css) ── */
      :root {
        --splash-bg:              #f0ece4;
        --splash-text:            #28241f;
        --splash-text-secondary:  #6b6460;
        --splash-text-tertiary:   #a09894;
        --splash-accent:          #c96442;
        --splash-bar-bg:          #e2ddd5;
      }
      .dark {
        --splash-bg:              #2a2824;
        --splash-text:            #f0ede6;
        --splash-text-secondary:  #a8a49c;
        --splash-text-tertiary:   #6b6862;
        --splash-accent:          #c96442;
        --splash-bar-bg:          #44403b;
      }

      /* ── Splash layout ── */
      #splash-screen {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: var(--splash-bg);
        z-index: 9999;
        transition: opacity 400ms ease-out;
      }

      #splash-screen.splash-fade-out {
        opacity: 0;
        pointer-events: none;
      }

      /* ── Brand mark ── */
      .splash-mark {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background-color: var(--splash-accent);
        margin-bottom: 24px;
        animation: splash-pulse 2s ease-in-out infinite;
      }

      @keyframes splash-pulse {
        0%, 100% { transform: scale(1);   opacity: 0.75; }
        50%      { transform: scale(1.5); opacity: 1;    }
      }

      /* ── Typography ── */
      .splash-title {
        font-family: 'Georgia', 'Source Serif 4', 'Noto Serif SC', serif;
        font-size: 28px;
        font-weight: 600;
        color: var(--splash-text);
        letter-spacing: 0.02em;
        margin-bottom: 6px;
        user-select: none;
      }

      .splash-subtitle {
        font-size: 12px;
        font-weight: 400;
        color: var(--splash-text-secondary);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin-bottom: 48px;
        user-select: none;
      }

      /* ── Progress bar ── */
      .splash-bar-track {
        width: 160px;
        height: 3px;
        background-color: var(--splash-bar-bg);
        border-radius: 999px;
        overflow: hidden;
        position: relative;
        margin-bottom: 14px;
      }

      .splash-bar-fill {
        height: 100%;
        width: 0%;
        background-color: var(--splash-accent);
        border-radius: 999px;
        transition: width 600ms cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* Indeterminate shimmer */
      .splash-bar-fill.indeterminate {
        width: 35%;
        animation: splash-shimmer 1.8s ease-in-out infinite;
      }

      @keyframes splash-shimmer {
        0%   { transform: translateX(-60%);  }
        50%  { transform: translateX(200%);  }
        100% { transform: translateX(-60%);  }
      }

      /* ── Status label ── */
      .splash-label {
        font-size: 12px;
        font-weight: 400;
        color: var(--splash-text-tertiary);
        letter-spacing: 0.02em;
        text-align: center;
        min-height: 18px;
        user-select: none;
      }

      /* ── Version ── */
      .splash-version {
        position: absolute;
        bottom: 28px;
        font-size: 11px;
        font-weight: 400;
        color: var(--splash-text-tertiary);
        letter-spacing: 0.03em;
        opacity: 0.5;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="splash-screen">
        <div class="splash-mark"></div>
        <div class="splash-title">CaILens</div>
        <div class="splash-subtitle">Calendar &times; Lens</div>
        <div class="splash-bar-track">
          <div class="splash-bar-fill indeterminate" id="splash-bar-fill"></div>
        </div>
        <div class="splash-label" id="splash-label">Starting up&hellip;</div>
        <div class="splash-version">v3.7</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
